<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL DESAFÍO DEL PLATO SALUDABLE - GOED</title>
    
    <!-- CDNs de React, ReactDOM, Babel, Tailwind CSS y FontAwesome para garantizar ejecución offline-ready -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f0fdf4;
            margin: 0;
            overflow-x: hidden;
        }
        .font-kids { font-family: 'Montserrat', sans-serif; }
        
        /* Animaciones para elementos interactivos */
        .food-bounce:hover {
            transform: scale(1.1) rotate(3deg);
            transition: all 0.2s ease-in-out;
        }
        
        /* Configuración de impresión de alta calidad para PDFs escolares */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            /* Ocultar barra de desplazamiento */
            ::-webkit-scrollbar { display: none; }
        }
        
        /* Efecto de scrollbar suave */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === CONSTANTES: CATEGORÍAS DE ALIMENTOS ===
        const CATEGORIES = {
          FRUTAS: { id: 'frutas', name: 'FRUTAS', color: 'bg-red-100 border-red-400 text-red-700', icon: '🍎' },
          VERDURAS: { id: 'verduras', name: 'VERDURAS', color: 'bg-emerald-100 border-emerald-400 text-emerald-700', icon: '🥕' },
          LACTEOS: { id: 'lacteos', name: 'LÁCTEOS', color: 'bg-blue-100 border-blue-400 text-blue-700', icon: '🥛' },
          CEREALES: { id: 'cereales', name: 'CEREALES Y LEGUMBRES', color: 'bg-amber-100 border-amber-400 text-amber-700', icon: '🌾' },
          PROTEINAS: { id: 'proteinas', name: 'CARNES Y PESCADOS', color: 'bg-orange-100 border-orange-400 text-orange-700', icon: '🍗' },
          BEBIDAS: { id: 'bebidas', name: 'BEBIDAS', color: 'bg-cyan-100 border-cyan-400 text-cyan-700', icon: '🥤' },
          GOLOSINAS: { id: 'golosinas', name: 'GOLOSINAS Y SNACKS', color: 'bg-pink-100 border-pink-400 text-pink-700', icon: '🍩' }
        };

        // === BASE DE DATOS INICIAL DE ALIMENTOS (MAS DE 50 ITEMS) ===
        const INITIAL_FOOD_DATABASE = [
          // Frutas
          { id: 'f1', name: 'MANZANA', category: 'frutas', emoji: '🍎', healthy: true, soundText: '¡Manzana! Dulce y crocante.' },
          { id: 'f2', name: 'BANANA', category: 'frutas', emoji: '🍌', healthy: true, soundText: '¡Banana! Súper energía para correr.' },
          { id: 'f3', name: 'FRUTILLA', category: 'frutas', emoji: '🍓', healthy: true, soundText: '¡Frutilla! ¡Qué rica fruta roja!' },
          { id: 'f4', name: 'NARANJA', category: 'frutas', emoji: '🍊', healthy: true, soundText: '¡Naranja! Tiene mucha vitamina C.' },
          { id: 'f5', name: 'UVA', category: 'frutas', emoji: '🍇', healthy: true, soundText: '¡Uva! Pequeña y muy dulce.' },
          { id: 'f6', name: 'SANDÍA', category: 'frutas', emoji: '🍉', healthy: true, soundText: '¡Sandía! Muy fresca y jugosa.' },
          { id: 'f7', name: 'DURAZNO', category: 'frutas', emoji: '🍑', healthy: true, soundText: '¡Durazno! Suave y perfumado.' },
          { id: 'f8', name: 'PERA', category: 'frutas', emoji: '🍐', healthy: true, soundText: '¡Pera! Dulce y con mucha agua.' },
          { id: 'f9', name: 'ANANÁ', category: 'frutas', emoji: '🍍', healthy: true, soundText: '¡Ananá! Muy rica y tropical.' },
          { id: 'f10', name: 'CEREZA', category: 'frutas', emoji: '🍒', healthy: true, soundText: '¡Cereza! Pequeña, roja y sabrosa.' },

          // Verduras
          { id: 'v1', name: 'ZANAHORIA', category: 'verduras', emoji: '🥕', healthy: true, soundText: '¡Zanahoria! Hace muy bien a los ojos.' },
          { id: 'v2', name: 'CHOCLO', category: 'verduras', emoji: '🌽', healthy: true, soundText: '¡Choclo! Amarillo y súper dulce.' },
          { id: 'v3', name: 'TOMATE', category: 'verduras', emoji: '🍅', healthy: true, soundText: '¡Tomate! Jugoso para ensaladas.' },
          { id: 'v4', name: 'BRÓCOLI', category: 'verduras', emoji: '🥦', healthy: true, soundText: '¡Brócoli! Parecen pequeños arbolitos verdes.' },
          { id: 'v5', name: 'LECHUGA', category: 'verduras', emoji: '🥬', healthy: true, soundText: '¡Lechuga! Súper fresca y crujiente.' },
          { id: 'v6', name: 'CALABAZA', category: 'verduras', emoji: '🎃', healthy: true, soundText: '¡Calabaza! Espectacular para hacer puré.' },
          { id: 'v7', name: 'PALTA', category: 'verduras', emoji: '🥑', healthy: true, soundText: '¡Palta! Cremosa y súper saludable.' },
          { id: 'v8', name: 'PAPA', category: 'verduras', emoji: '🥔', healthy: true, soundText: '¡Papa! Qué ricas son al horno.' },
          { id: 'v9', name: 'BERENJENA', category: 'verduras', emoji: '🍆', healthy: true, soundText: '¡Berenjena! Muy nutritiva y violeta.' },
          { id: 'v10', name: 'CEBOLLA', category: 'verduras', emoji: '🧅', healthy: true, soundText: '¡Cebolla! Da mucho sabor a la comida.' },

          // Lácteos
          { id: 'l1', name: 'LECHE', category: 'lacteos', emoji: '🥛', healthy: true, soundText: '¡Leche! Tiene calcio para los dientes y huesos.' },
          { id: 'l2', name: 'YOGUR', category: 'lacteos', emoji: '🥛', healthy: true, soundText: '¡Yogur! Súper rico y bueno para la panza.' },
          { id: 'l3', name: 'QUESO', category: 'lacteos', emoji: '🧀', healthy: true, soundText: '¡Queso! Nutritivo y muy sabroso.' },
          { id: 'l4', name: 'MANTECA', category: 'lacteos', emoji: '🧈', healthy: false, soundText: 'Manteca. Tiene mucha grasa, comer solo un poquito.' },

          // Cereales y Legumbres
          { id: 'c1', name: 'PAN INTEGRAL', category: 'cereales', emoji: '🍞', healthy: true, soundText: '¡Pan integral! Tiene mucha fibra saludable.' },
          { id: 'c2', name: 'AVENA', category: 'cereales', emoji: '🥣', healthy: true, soundText: '¡Avena! Súper energía para ir a jugar.' },
          { id: 'c3', name: 'ARROZ', category: 'cereales', emoji: '🍚', healthy: true, soundText: '¡Arroz! Un cereal que nos da fuerzas.' },
          { id: 'c4', name: 'LENTEJAS', category: 'cereales', emoji: '🍲', healthy: true, soundText: '¡Lentejas! Tienen mucho hierro.' },
          { id: 'c5', name: 'FIDEOS', category: 'cereales', emoji: '🍝', healthy: true, soundText: '¡Fideos! Súper energía para correr.' },
          { id: 'c6', name: 'GARBANZOS', category: 'cereales', emoji: '🌾', healthy: true, soundText: '¡Garbanzos! Súper legumbres ricas en proteínas.' },

          // Proteínas (Carnes y Pescados)
          { id: 'p1', name: 'POLLO', category: 'proteinas', emoji: '🍗', healthy: true, soundText: '¡Pollo! Nos ayuda a formar músculos fuertes.' },
          { id: 'p2', name: 'PESCADO', category: 'proteinas', emoji: '🐟', healthy: true, soundText: '¡Pescado! Hace muy bien al cerebro.' },
          { id: 'p3', name: 'HUEVO', category: 'proteinas', emoji: '🥚', healthy: true, soundText: '¡Huevo! Excelente proteína natural.' },
          { id: 'p4', name: 'CARNE DE VACA', category: 'proteinas', emoji: '🥩', healthy: true, soundText: '¡Carne! Fuerza para todo el día.' },

          // Bebidas
          { id: 'b1', name: 'AGUA', category: 'bebidas', emoji: '💧', healthy: true, soundText: '¡Agua! Lo mejor del mundo para hidratarnos.' },
          { id: 'b2', name: 'JUGO NATURAL', category: 'bebidas', emoji: '🍹', healthy: true, soundText: '¡Jugo exprimido! Rico y con vitaminas.' },
          { id: 'b3', name: 'GASEOSA', category: 'bebidas', emoji: '🥤', healthy: false, soundText: 'Gaseosa. Tiene mucha azúcar, mejor tomar agua.' },

          // Golosinas y Snacks
          { id: 'g1', name: 'DONA', category: 'golosinas', emoji: '🍩', healthy: false, soundText: 'Dona. Muy dulce, para comer solo de vez en cuando.' },
          { id: 'g2', name: 'CHOCOLATE', category: 'golosinas', emoji: '🍫', healthy: false, soundText: 'Chocolate. Un permitido muy rico, ¡pero sin abusar!' },
          { id: 'g3', name: 'CHUPETÍN', category: 'golosinas', emoji: '🍭', healthy: false, soundText: 'Chupetín. ¡Cuidado con las caries!' },
          { id: 'g4', name: 'PAPAS FRITAS', category: 'golosinas', emoji: '🍟', healthy: false, soundText: 'Papas fritas. Tienen mucha sal y aceite.' },
          { id: 'g5', name: 'HELADO', category: 'golosinas', emoji: '🍦', healthy: false, soundText: 'Helado. Muy cremoso, pero con bastante azúcar.' },
          { id: 'g6', name: 'ALFAJOR', category: 'golosinas', emoji: '🍪', healthy: false, soundText: 'Alfajor. Un gustito dulce para la merienda.' },
          { id: 'g7', name: 'CARAMELOS', category: 'golosinas', emoji: '🍬', healthy: false, soundText: 'Caramelos. Tienen mucha azúcar pegajosa.' },
          { id: 'g8', name: 'PIZZA', category: 'golosinas', emoji: '🍕', healthy: false, soundText: 'Pizza. Muy rica, pero mejor si tiene vegetales.' },
          { id: 'g9', name: 'HAMBURGUESA', category: 'golosinas', emoji: '🍔', healthy: false, soundText: 'Hamburguesa. Para comer de vez en cuando en familia.' },
          { id: 'g10', name: 'SALCHICHA', category: 'golosinas', emoji: '🌭', healthy: false, soundText: 'Salchicha. Es un embutido con mucha sal.' }
        ];

        // === CONFIGURACIÓN DE LOS 4 NIVELES ===
        const LEVELS = [
          { id: 1, name: 'DESAYUNO SALUDABLE', icon: <i className="fa-solid fa-mug-saucer text-amber-500 text-2xl"></i>, desc: '¡Vamos a preparar el desayuno más nutritivo para empezar el día con súper energía!' },
          { id: 2, name: 'ALMUERZO SALUDABLE', icon: <i className="fa-solid fa-bowl-food text-emerald-500 text-2xl"></i>, desc: 'Es hora del almuerzo. Combina vegetales, proteínas y agua fresca.' },
          { id: 3, name: 'MERIENDA SALUDABLE', icon: <i className="fa-solid fa-cookie-bite text-orange-500 text-2xl"></i>, desc: '¡Una merienda divertida! Elige lácteos, frutas y cereales.' },
          { id: 4, name: 'CENA SALUDABLE', icon: <i className="fa-solid fa-moon text-indigo-500 text-2xl"></i>, desc: 'Una cena liviana y saludable para dormir felices y soñar lindo.' }
        ];

        function App() {
          // --- ESTADOS NAVEGACIÓN ---
          const [currentScreen, setCurrentScreen] = useState('welcome'); // welcome, play, teacher, goed, diploma
          const [soundEnabled, setSoundEnabled] = useState(true);
          const [foods, setFoods] = useState(INITIAL_FOOD_DATABASE);
          const [customActivities, setCustomActivities] = useState([]);
          const [studentName, setStudentName] = useState('PEQUEÑO GOURMET');
          const [selectedGender, setSelectedGender] = useState('o'); // o / a / x

          // --- ESTADOS JUEGO ---
          const [currentLevelIdx, setCurrentLevelIdx] = useState(0);
          const [selectedCategory, setSelectedCategory] = useState('all');
          const [plateFoods, setPlateFoods] = useState([]);
          const [gameStats, setGameStats] = useState({
            1: { foods: [], attempts: 0, time: 0 },
            2: { foods: [], attempts: 0, time: 0 },
            3: { foods: [], attempts: 0, time: 0 },
            4: { foods: [], attempts: 0, time: 0 }
          });
          const [levelCompleted, setLevelCompleted] = useState(false);
          const [earnedBadges, setEarnedBadges] = useState([]);
          
          // --- ESTADOS ASISTENTE IA ---
          const [iaResponse, setIaResponse] = useState('');
          const [iaExpression, setIaExpression] = useState('happy'); // happy, thinking, cheering

          // --- TOAST NOTIFICATION ---
          const [toast, setToast] = useState({ show: false, message: '', type: 'purple' });

          // --- ESTADOS SEGURIDAD ADULTO ---
          const [pinInput, setPinInput] = useState('');
          const [showPinModal, setShowPinModal] = useState({ active: false, targetScreen: '' });
          const [docenteError, setDocenteError] = useState('');
          const [newFood, setNewFood] = useState({ name: '', category: 'frutas', emoji: '🍎', healthy: true, soundText: '' });
          
          // --- ESTADOS MODAL GOED & IMPRESIÓN ---
          const [customSequence, setCustomSequence] = useState({ 
            name: '', 
            targetAge: '5', 
            school: 'JARDÍN DE INFANTES DE LA CIUDAD',
            author: 'DOCENTE ENLACE GOED',
            description: '', 
            activities: ''
          });
          const [activePrintSection, setActivePrintSection] = useState(null); // 'diploma', 'report', 'sequence'
          const [sequenceToPrint, setSequenceToPrint] = useState(null);

          // Cronómetro
          const [seconds, setSeconds] = useState(0);
          const timerRef = useRef(null);

          // Temporizador de juego
          useEffect(() => {
            if (currentScreen === 'play' && !levelCompleted) {
              timerRef.current = setInterval(() => {
                setSeconds((prev) => prev + 1);
              }, 1000);
            } else {
              clearInterval(timerRef.current);
            }
            return () => clearInterval(timerRef.current);
          }, [currentScreen, levelCompleted, currentLevelIdx]);

          // Autocerrar el Toast informativo
          useEffect(() => {
            if (toast.show) {
              const timer = setTimeout(() => {
                setToast(prev => ({ ...prev, show: false }));
              }, 4000);
              return () => clearTimeout(timer);
            }
          }, [toast.show]);

          // Bienvenida inicial por voz
          useEffect(() => {
            if (currentScreen === 'welcome') {
              speak("¡Hola amiguito! Soy Súper Salud. ¡Vamos a construir platos deliciosos y saludables! Escribe tu nombre para empezar a jugar.");
            }
          }, [currentScreen]);

          // Bienvenida del nivel activo
          useEffect(() => {
            if (currentScreen === 'play') {
              setPlateFoods([]);
              setLevelCompleted(false);
              setSeconds(0);
              const level = LEVELS[currentLevelIdx];
              speak(`Nivel ${currentLevelIdx + 1}. Prepararemos un ${level.name}. ${level.desc}`);
              setIaResponse(`¡Hola! Ayúdame a armar un plato riquísimo. Elige alimentos saludables y colócalos en el plato central.`);
              setIaExpression('happy');
            }
          }, [currentLevelIdx, currentScreen]);

          // === SÍNTESIS DE VOZ DE SÚPER SALUD ===
          const speak = (text) => {
            if (!soundEnabled) return;
            if ('speechSynthesis' in window) {
              try {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-AR';
                utterance.rate = 1.0;
                utterance.pitch = 1.25; 
                window.speechSynthesis.speak(utterance);
              } catch (e) {
                console.error("Error en SpeechSynthesis:", e);
              }
            }
          };

          // Añadir alimento al plato
          const handleSelectFood = (food) => {
            if (plateFoods.some(f => f.id === food.id)) {
              speak(`¡El alimento ${food.name} ya está en el plato!`);
              return;
            }

            speak(food.soundText);
            const updatedPlate = [...plateFoods, food];
            setPlateFoods(updatedPlate);

            // Registro estadístico
            setGameStats(prev => {
              const currentLevelData = prev[currentLevelIdx + 1] || { foods: [], attempts: 0, time: 0 };
              return {
                ...prev,
                [currentLevelIdx + 1]: {
                  ...currentLevelData,
                  foods: updatedPlate,
                  attempts: currentLevelData.attempts + 1,
                  time: seconds
                }
              };
            });

            // Reacción interactiva de Súper Salud
            if (food.healthy) {
              setIaExpression('cheering');
              const positivePhrases = [
                `¡Qué gran elección! El alimento ${food.name} es genial para crecer súper fuertes.`,
                `¡Súper rico! ¿Sabías que ${food.name} te da energía para jugar sin parar?`,
                `¡Me encanta! Es una opción muy sana para el cuerpo.`
              ];
              setIaResponse(positivePhrases[Math.floor(Math.random() * positivePhrases.length)]);
            } else {
              setIaExpression('thinking');
              setIaResponse(`¡Oh! ${food.name} es rico, pero tiene mucha azúcar o grasas. Intentemos comerlo muy poquito y buscar algo más natural.`);
            }
          };

          const handleRemoveFood = (foodId) => {
            const updatedPlate = plateFoods.filter(f => f.id !== foodId);
            setPlateFoods(updatedPlate);
            speak("Quitamos ese alimento del plato.");
          };

          // Comprobar calidad nutritiva del plato
          const handleCheckPlate = () => {
            if (plateFoods.length < 3) {
              speak("¡Tu plato todavía se ve un poco vacío! Agrega al menos 3 alimentos para hacerlo súper completo.");
              setIaResponse("¿Te parece si agregamos algunos alimentos más para que sea un plato súper poderoso?");
              setIaExpression('thinking');
              return;
            }

            const healthyCount = plateFoods.filter(f => f.healthy).length;
            const unhealthyCount = plateFoods.filter(f => !f.healthy).length;
            
            let feedbackText = "";
            let levelBadges = [...earnedBadges];

            if (healthyCount >= 3 && unhealthyCount === 0) {
              setIaExpression('cheering');
              feedbackText = `¡ESPECTACULAR! Armaste un plato 100% saludable. ¡Sos un verdadero campeón de la nutrición! ¿Por qué elegiste estas opciones? ¡Cuéntale a tu docente o compañeros!`;
              
              const badgeMap = {
                0: '🥛 Maestro de los Desayunos',
                1: '🥦 Campeón de los Almuerzos',
                2: '🍎 Experto en Meriendas',
                3: '🍽️ Súper Chef Saludable'
              };
              
              if (!levelBadges.includes(badgeMap[currentLevelIdx])) {
                levelBadges.push(badgeMap[currentLevelIdx]);
              }
            } else if (healthyCount >= 2) {
              setIaExpression('happy');
              feedbackText = `¡Muy buen trabajo! Tu plato tiene alimentos súper saludables. ¿Qué te parece si reemplazamos lo menos sano por una rica fruta o verdura la próxima vez? ¡Vamos excelente!`;
              if (!levelBadges.includes('🥕 Amigo de las Verduras') && plateFoods.some(f => f.category === 'verduras')) {
                levelBadges.push('🥕 Amigo de las Verduras');
              }
            } else {
              setIaExpression('thinking');
              feedbackText = `¡Tenemos una gran idea! Tu plato se ve rico, pero podemos hacerlo aún más poderoso si sumamos frutas, verduras o cereales. ¿Qué opción saludable te gustaría agregar?`;
            }

            setEarnedBadges(levelBadges);
            setIaResponse(feedbackText);
            speak(feedbackText);
            setLevelCompleted(true);
          };

          const handleNextLevel = () => {
            if (currentLevelIdx < LEVELS.length - 1) {
              setCurrentLevelIdx(prev => prev + 1);
            } else {
              speak(`¡Felicitaciones ${studentName}! Completaste todos los desafíos de alimentación saludable. ¡Sos un súper experto!`);
              setCurrentScreen('diploma');
            }
          };

          const handlePinValidation = () => {
            if (pinInput === '1234') {
              setCurrentScreen(showPinModal.targetScreen);
              setShowPinModal({ active: false, targetScreen: '' });
              setPinInput('');
              setDocenteError('');
            } else {
              setDocenteError('PIN Incorrecto. ¡El código de seguridad escolar es 1234!');
            }
          };

          const triggerAdultArea = (target) => {
            setShowPinModal({ active: true, targetScreen: target });
          };

          // Guardar secuencia didáctica de GOED
          const handleSaveGoedActivity = (e) => {
            e.preventDefault();
            const newSequence = { 
              ...customSequence, 
              id: Date.now(), 
              fecha_creacion: new Date().toLocaleDateString() 
            };
            
            setCustomActivities([...customActivities, newSequence]);
            setSequenceToPrint(newSequence);

            setToast({
              show: true,
              message: "¡PLANIFICACIÓN PEDAGÓGICA CREADA EN MODO GOED!",
              type: 'purple'
            });
            
            speak("Secuencia pedagógica guardada con éxito. Ya podés imprimirla en PDF.");
            
            // Limpiar formulario manteniendo datos institucionales
            setCustomSequence(prev => ({
              ...prev,
              name: '',
              description: '',
              activities: ''
            }));
          };

          // Gatillar ventana de impresión
          const printSection = (sectionType, data = null) => {
            setActivePrintSection(sectionType);
            if (sectionType === 'sequence' && data) {
              setSequenceToPrint(data);
            }
            
            setTimeout(() => {
              window.print();
            }, 250);
          };

          return (
            <div className="min-h-screen bg-gradient-to-b from-sky-100 via-emerald-50 to-amber-50 font-sans text-slate-800 flex flex-col select-none">
              
              {/* ========================================== */}
              {/* CABECERA PRINCIPAL ACCESIBLE (No se imprime) */}
              {/* ========================================== */}
              <header className="bg-white shadow-md border-b-4 border-emerald-400 py-3 px-6 flex justify-between items-center sticky top-0 z-40 print:hidden">
                <div className="flex items-center gap-3">
                  <div className="bg-emerald-500 p-2.5 rounded-full shadow-md animate-bounce flex items-center justify-center">
                    <i className="fa-solid fa-apple-whole text-white text-2xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl md:text-2xl font-extrabold tracking-wide text-emerald-600 uppercase">
                      EL DESAFÍO DEL PLATO SALUDABLE
                    </h1>
                    <p className="text-[10px] text-slate-500 font-bold tracking-wider uppercase hidden sm:block">
                      GERENCIA OPERATIVA DE EDUCACIÓN DIGITAL (GOED) • GCABA
                    </p>
                  </div>
                </div>

                <div className="flex items-center gap-2">
                  <button 
                    onClick={() => {
                      setSoundEnabled(!soundEnabled);
                      if (!soundEnabled) speak("¡Sonido activado!");
                    }}
                    className={`p-2 rounded-full border-2 transition-all shadow flex items-center justify-center w-10 h-10 ${soundEnabled ? 'bg-green-500 text-white border-green-600' : 'bg-red-500 text-white border-red-600'}`}
                    title="Voz de Súper Salud"
                  >
                    {soundEnabled ? <i className="fa-solid fa-volume-high text-sm"></i> : <i className="fa-solid fa-volume-xmark text-sm"></i>}
                  </button>

                </div>
              </footer>

              {/* ========================================== */}
              {/* MODAL PIN DE ADULTOS (No se imprime) */}
              {/* ========================================== */}
              {showPinModal.active && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden">
                  <div className="bg-white rounded-3xl border-6 border-amber-400 p-6 max-w-sm w-full text-center shadow-2xl">
                    <div className="bg-amber-100 p-3 rounded-full inline-block mb-3">
                      <i className="fa-solid fa-lock text-2xl text-amber-600"></i>
                    </div>
                    <h3 className="text-lg font-black text-slate-800 uppercase mb-1">CONTROL DE ADULTOS</h3>
                    <p className="text-[10px] font-bold text-slate-500 uppercase mb-4 leading-normal">
                      Para ingresar escribe el PIN institucional: <strong className="text-amber-600">1234</strong>
                    </p>

                    <input 
                      type="password" 
                      maxLength="4"
                      value={pinInput}
                      onChange={(e) => setPinInput(e.target.value)}
                      className="w-full text-center text-3xl font-bold tracking-widest p-2 border-3 border-slate-300 rounded-xl focus:outline-none focus:border-amber-500 bg-slate-50 mb-3"
                      placeholder="••••"
                    />

                    {docenteError && <p className="text-[9px] text-red-500 font-extrabold uppercase mb-3">{docenteError}</p>}

                    <div className="flex gap-2">
                      <button 
                        onClick={() => {
                          setShowPinModal({ active: false, targetScreen: '' });
                          setPinInput('');
                          setDocenteError('');
                        }}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-extrabold py-2 rounded-xl text-xs uppercase"
                      >
                        Cancelar
                      </button>
                      <button 
                        onClick={handlePinValidation}
                        className="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-extrabold py-2 rounded-xl text-xs uppercase"
                      >
                        Confirmar
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
