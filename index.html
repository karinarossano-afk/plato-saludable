<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL DESAFÍO DEL PLATO SALUDABLE - CHF</title>
    
    <!-- CDNs estables de React, ReactDOM, Babel, Tailwind CSS y FontAwesome para Iconos -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #fdf2f8; /* Fondo rosa/magenta sumamente suave */
            margin: 0;
            overflow-x: hidden;
        }
        .font-kids { font-family: 'Montserrat', sans-serif; }
        
        /* Animaciones fluidas para los alimentos */
        .food-bounce:hover {
            transform: scale(1.1) rotate(5deg);
            transition: all 0.2s ease-in-out;
        }

        /* Estilo de botones táctiles infantiles con profundidad visual */
        .btn-kids {
            border-bottom-width: 6px;
            transition: all 0.1s;
        }
        .btn-kids:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        
        /* Barra de scroll personalizada con los colores CHF */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #E5007D; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

          { id: 'v1', name: 'ZANAHORIA', category: 'verduras', emoji: '🥕', healthy: true, points: 10, soundText: '¡Zanahoria! Genial para cuidar tus ojos.' },
          { id: 'v2', name: 'CHOCLO', category: 'verduras', emoji: '🌽', healthy: true, points: 10, soundText: '¡Choclo! Amarillo, tierno, y re sabroso.' },
          { id: 'v3', name: 'TOMATE', category: 'verduras', emoji: '🍅', healthy: true, points: 10, soundText: '¡Tomate! Rojo, fresco y jugoso para tus ensaladas.' },

          { id: 'l2', name: 'YOGUR', category: 'lacteos', emoji: '🥛', healthy: true, points: 10, soundText: '¡Yogur! Muy rico y re bueno para cuidar la pancita.' },
          { id: 'l3', name: 'QUESO', category: 'lacteos', emoji: '🧀', healthy: true, points: 10, soundText: '¡Queso! Nutritivo, y re sabroso.' },

          { id: 'c1', name: 'PAN INTEGRAL', category: 'cereales', emoji: '🍞', healthy: true, points: 10, soundText: '¡Pan integral! Tiene mucha fibra buena para tu panza.' },
          { id: 'c2', name: 'AVENA', category: 'cereales', emoji: '🥣', healthy: true, points: 10, soundText: '¡Avena! Súper energía para jugar sin parar.' },
          { id: 'c3', name: 'ARROZ', category: 'cereales', emoji: '🍚', healthy: true, points: 10, soundText: '¡Arroz! Un cereal re bueno para combinar con todo.' },

          { id: 'p1', name: 'POLLO', category: 'proteinas', emoji: '🍗', healthy: true, points: 10, soundText: '¡Pollo! Proteína sana para que tus músculos crezcan fuertes.' },
          { id: 'p2', name: 'PESCADO', category: 'proteinas', emoji: '🐟', healthy: true, points: 10, soundText: '¡Pescado! Re sano y buenísimo para el cerebro.' },
          { id: 'p3', name: 'HUEVO', category: 'proteinas', emoji: '🥚', healthy: true, points: 10, soundText: '¡Huevo! Excelente proteína natural y re nutritiva.' },
          { id: 'p4', name: 'CARNE', category: 'proteinas', emoji: '🥩', healthy: true, points: 10, soundText: '¡Carne! Te da un montón de fuerza para todo el día.' },

          { id: 'b1', name: 'AGUA', category: 'bebidas', emoji: '💧', healthy: true, points: 15, soundText: '¡Agua! Lo mejor de todo para calmar la sed e hidratarte.' },
          { id: 'b2', name: 'JUGO NATURAL', category: 'bebidas', emoji: '🍹', healthy: true, points: 10, soundText: '¡Jugo exprimido natural! Con vitaminas de fruta real.' },
          { id: 'b3', name: 'GASEOSA', category: 'bebidas', emoji: '🥤', healthy: false, points: -5, soundText: 'La Gaseosa tiene un montón de azúcar. Es mucho mejor tomar agua.' },

          { id: 'g1', name: 'DONA', category: 'golosinas', emoji: '🍩', healthy: false, points: -5, soundText: 'La Dona dulce es rica, pero para comer solo un poquito.' },
          { id: 'g2', name: 'CHOCOLATE', category: 'golosinas', emoji: '🍫', healthy: false, points: -2, soundText: 'Chocolate. Un permitido dulce, ¡pero no hay que abusar!' },
          { id: 'g3', name: 'CHUPETÍN', category: 'golosinas', emoji: '🍭', healthy: false, points: -5, soundText: 'Chupetín. ¡Ojo con las caries en los dientes! Mejor elegí una fruta.' },
          { id: 'g4', name: 'PAPA FRITAS', category: 'golosinas', emoji: '🍟', healthy: false, points: -4, soundText: 'Papas fritas de paquete. Tienen mucha sal y grasas artificiales.' },
          { id: 'g5', name: 'HELADO', category: 'golosinas', emoji: '🍦', healthy: false, points: -3, soundText: 'Helado. Muy refrescante, pero tiene un montón de azúcar.' },
          { id: 'g6', name: 'ALFAJOR', category: 'golosinas', emoji: '🍪', healthy: false, points: -3, soundText: 'Alfajor dulce. Riquísimo para un gustito, pero mejor una fruta.' }
        ];

        const LEVELS = [
          { id: 1, name: 'DESAYUNO SALUDABLE', icon: <i className="fa-solid fa-mug-saucer text-amber-500 text-xl"></i>, desc: '¡Vamos a preparar el desayuno más nutritivo para empezar el día con súper energía!' },
          { id: 2, name: 'ALMUERZO SALUDABLE', icon: <i className="fa-solid fa-bowl-food text-[#00A75A] text-xl"></i>, desc: 'Es hora del almuerzo. Combina vegetales, proteínas y agua fresca.' },
          { id: 3, name: 'MERIENDA SALUDABLE', icon: <i className="fa-solid fa-cookie-bite text-orange-500 text-xl"></i>, desc: '¡Una merienda divertida! Elige lácteos, frutas y cereales.' },
          { id: 4, name: 'CENA SALUDABLE', icon: <i className="fa-solid fa-moon text-indigo-500 text-xl"></i>, desc: 'Una cena liviana y saludable para dormir felices y soñar lindo.' }
        ];

        // === COMPONENTE DE MARCA DE LOGOTIPO CHF (CON TAMAÑO CONTROLADO) ===
        function BrandLogo({ className = "h-12", maxW = "150px" }) {
          const [imageError, setImageError] = React.useState(false);

          if (imageError) {
            return (
              <div className="flex items-center gap-2 select-none" style={{ maxWidth: maxW }}>
                <svg viewBox="0 0 100 100" className="w-10 h-10">
                  <circle cx="50" cy="40" r="30" fill="none" stroke="#E5007D" strokeWidth="8" />
                  <circle cx="50" cy="40" r="18" fill="none" stroke="#00A75A" strokeWidth="6" />
                  <circle cx="50" cy="40" r="6" fill="#00A75A" />
                  <path d="M 50 85 C 45 85, 38 80, 38 70 L 38 55 C 38 52, 42 50, 45 50 C 48 50, 50 52, 50 55 L 50 35 C 50 32, 54 30, 57 30 C 60 30, 62 32, 62 35 L 62 65 C 62 75, 58 85, 50 85 Z" fill="#E5007D" />
                </svg>
                <div className="flex flex-col text-left">
                  <span className="font-kids text-xl text-[#E5007D] leading-none">CHF</span>
                  <span className="text-[9px] font-bold text-[#00A75A] tracking-wider uppercase leading-none">Capacitarte</span>
                </div>
              </div>
            );
          }

          return (
            <img 
              src="logo_chf_png.png" 
              alt="Logo Capacitarte Hacia el Futuro" 
              className={className} 
              style={{ maxWidth: maxW, height: 'auto', objectFit: 'contain' }}
              onError={() => setImageError(true)}
            />
          );
        }

        // === COMPONENTE PRINCIPAL ===
        function App() {
          const [currentScreen, setCurrentScreen] = React.useState('welcome'); 
          const [soundEnabled, setSoundEnabled] = React.useState(true);
          const [foods, setFoods] = React.useState(INITIAL_FOOD_DATABASE);
          const [customActivities, setCustomActivities] = React.useState([]);
          const [studentName, setStudentName] = React.useState('SÚPER PEQUE');
          const [selectedGender, setSelectedGender] = React.useState('o'); 
          const [currentRoom, setCurrentRoom] = React.useState('SALA DE JARDÍN');

          const [currentLevelIdx, setCurrentLevelIdx] = React.useState(0);
          const [selectedCategory, setSelectedCategory] = React.useState('all');
          const [plateFoods, setPlateFoods] = React.useState([]); 
          const [gameStats, setGameStats] = React.useState({
            1: { foods: [], attempts: 0, time: 0 },
            2: { foods: [], attempts: 0, time: 0 },
            3: { foods: [], attempts: 0, time: 0 },
            4: { foods: [], attempts: 0, time: 0 }
          });
          const [levelCompleted, setLevelCompleted] = React.useState(false);
          const [earnedBadges, setEarnedBadges] = React.useState([]);
          const [activeInstruction, setActiveInstruction] = React.useState('');
          
          const [iaResponse, setIaResponse] = React.useState('');
          const [iaExpression, setIaExpression] = React.useState('happy'); 

          const [toast, setToast] = React.useState({ show: false, message: '', type: 'purple' });

          const [pinInput, setPinInput] = React.useState('');
          const [showPinModal, setShowPinModal] = React.useState({ active: false, targetScreen: '' });
          const [docenteError, setDocenteError] = React.useState('');
          const [newFood, setNewFood] = React.useState({ name: '', category: 'frutas', emoji: '🍎', healthy: true, soundText: '' });
          
          const [customSequence, setCustomSequence] = React.useState({ 
            name: '', 
            targetAge: 'SALA ABIERTA', 
            school: 'JARDÍN DE INFANTES DE LA CIUDAD',
            author: 'DOCENTE PLANIFICADOR',
            description: '', 
            activities: '',
            levels: [] 
          });

          const [activePrintSection, setActivePrintSection] = React.useState(null); 
          const [sequenceToPrint, setSequenceToPrint] = React.useState(null); 

          const [seconds, setSeconds] = React.useState(0);
          const timerRef = React.useRef(null);

          // Cargar voces del navegador de forma asincrónica
          React.useEffect(() => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.getVoices();
              window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
              };
            }
          }, []);

          // Temporizador del juego
          React.useEffect(() => {
            if (currentScreen === 'play' && !levelCompleted) {
              timerRef.current = setInterval(() => {
                setSeconds((prev) => prev + 1);
              }, 1000);
            } else {
              clearInterval(timerRef.current);
            }
            return () => clearInterval(timerRef.current);
          }, [currentScreen, levelCompleted, currentLevelIdx]);

          // Autocerrar Toast
          React.useEffect(() => {
            if (toast.show) {
              const timer = setTimeout(() => {
                setToast({ ...toast, show: false });
              }, 5000);
              return () => clearTimeout(timer);
            }
          }, [toast.show]);

          // Mensaje de bienvenida de Súper Salud al cargar
          React.useEffect(() => {
            if (currentScreen === 'welcome') {
              speak("¡Hola! Soy Súper Salud, de Capacitarte Hacia el Futuro. ¡Vamos a construir platos deliciosos, y re sanos! Escribí tu nombre para empezar a jugar.");
            }
          }, [currentScreen]);

          // Activar bienvenida del nivel actual
          React.useEffect(() => {
            if (currentScreen === 'play') {
              setPlateFoods([]);
              setLevelCompleted(false);
              setSeconds(0);
              const level = LEVELS[currentLevelIdx];
              setActiveInstruction(level.desc);
              speak(`Nivel ${currentLevelIdx + 1}. Vamos a preparar un ${level.name}. ${level.desc}`);
              setIaResponse(`¡Hola! Ayudame a armar un plato riquísimo. Elegí alimentos saludables y ponelos en el plato central.`);
              setIaExpression('happy');
            }
          }, [currentLevelIdx, currentScreen]);

          // === AUDIO NATURAL LOCALIZADO EN ESPAÑOL ARGENTINO ===
          const speak = (text) => {
            if (!soundEnabled) return;
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel(); 
              const utterance = new SpeechSynthesisUtterance(text);
              const voices = window.speechSynthesis.getVoices();
              
              let selectedVoice = voices.find(v => v.lang === 'es-AR' && (v.name.includes('Natural') || v.name.includes('Google')));
              if (!selectedVoice) selectedVoice = voices.find(v => v.lang === 'es-AR');
              if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Natural'));
              if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google'));
              if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('es-AR'));
              if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('es'));
              
              if (selectedVoice) {
                utterance.voice = selectedVoice;
              } else {
                utterance.lang = 'es-AR';
              }
              
              utterance.rate = 0.85; // Velocidad pausada que quita el tono rápido de computadora
              utterance.pitch = 1.02; // Tono cálido, amigable, no metálico
              window.speechSynthesis.speak(utterance);
            }
          };

          // === CONTROLES DEL PLATO ===
          const handleSelectFood = (food) => {
            if (plateFoods.some(f => f.id === food.id)) {
              speak(`¡El alimento ${food.name} ya lo pusiste en el plato!`);
              return;
            }

            speak(food.soundText);
            const updatedPlate = [...plateFoods, food];
            setPlateFoods(updatedPlate);

            setGameStats(prev => {
              const currentLevelData = prev[currentLevelIdx + 1] || { foods: [], attempts: 0, time: 0 };
              return {
                ...prev,
                [currentLevelIdx + 1]: {
                  ...currentLevelData,
                  foods: updatedPlate,
                  attempts: currentLevelData.attempts + 1,
                  time: seconds
                }
              };
            });

            generateLiveFeedback(food, updatedPlate);
          };

          const handleRemoveFood = (foodId) => {
            const updatedPlate = plateFoods.filter(f => f.id !== foodId);
            setPlateFoods(updatedPlate);
            speak("Sacamos ese alimento del plato.");
          };

          const generateLiveFeedback = (food, currentPlate) => {
            if (food.healthy) {
              setIaExpression('cheering');
              const positivePhrases = [
                `¡Qué buena elección! El alimento ${food.name} es espectacular para crecer re fuertes.`,
                `¡Buenísimo y súper rico! ¿Sabías que ${food.name} te da súper poderes para jugar un montón?`,
                `¡Me encanta! Es una opción re nutritiva para tu plato.`
              ];
              const randomPhrase = positivePhrases[Math.floor(Math.random() * positivePhrases.length)];
              setIaResponse(randomPhrase);
            } else {
              setIaExpression('thinking');
              setIaResponse(`¡Ojo! ${food.name} es muy rico, pero tiene un montón de azúcar o sal. Acordate de comerlo poquito y sumar opciones más naturales.`);
            }
          };

          const handleCheckPlate = () => {
            if (plateFoods.length < 3) {
              speak("¡Tu plato todavía está medio vacío! Agregá al menos 3 alimentos saludables para hacerlo súper nutritivo.");
              setIaResponse("¿Te parece si sumamos algunos alimentos más para que sea súper completo y nutritivo?");
              setIaExpression('thinking');
              return;
            }

            const healthyCount = plateFoods.filter(f => f.healthy).length;
            const unhealthyCount = plateFoods.filter(f => !f.healthy).length;
            
            let feedbackText = "";
            let levelBadges = [...earnedBadges];

            if (healthyCount >= 3 && unhealthyCount === 0) {
              setIaExpression('cheering');
              feedbackText = `¡ESPECTACULAR! Armaste un plato cien por ciento saludable. ¡Sos un verdadero campeón de la nutrición! ¿Por qué elegiste estas opciones? ¡Contale a tu maestra o compañeros!`;
              
              const badgeMap = {
                0: '🥛 Maestro de los Desayunos',
                1: '🥦 Campeón de los Almuerzos',
                2: '🍎 Experto en Meriendas',
                3: '🍽️ Súper Chef Saludable'
              };
              
              if (!levelBadges.includes(badgeMap[currentLevelIdx])) {
                levelBadges.push(badgeMap[currentLevelIdx]);
              }
            } else if (healthyCount >= 2) {
              setIaExpression('happy');
              feedbackText = `¡Muy buen trabajo! Tu plato tiene alimentos súper sanos. ¿Qué te parece si reemplazamos lo menos saludable por una rica fruta o verdura en el próximo nivel? ¡Vamos re bien!`;
              if (!levelBadges.includes('🥕 Amigo de las Verduras') && plateFoods.some(f => f.category === 'verduras')) {
                levelBadges.push('🥕 Amigo de las Verduras');
              }
            } else {
              setIaExpression('thinking');
              feedbackText = `¡Tengo una idea! Tu plato se ve re rico, pero podemos hacerlo más fuerte si sumamos frutas, verduras o cereales. ¿Qué opción saludable te gustaría poner?`;
            }

            setEarnedBadges(levelBadges);
            setIaResponse(feedbackText);
            speak(feedbackText);
            setLevelCompleted(true);
          };

          const handleNextLevel = () => {
            if (currentLevelIdx < LEVELS.length - 1) {
              setCurrentLevelIdx(prev => prev + 1);
            } else {
              speak(`¡Felicitaciones ${studentName}! Completaste todos los desafíos de alimentación saludable. ¡Sos un súper experto!`);
              setCurrentScreen('diploma');
            }
          };

          const handleCreateFood = (e) => {
            e.preventDefault();
            const id = 'custom_' + Date.now();
            const created = {
              ...newFood,
              id,
              points: newFood.healthy ? 10 : -3
            };
            setFoods([created, ...foods]);
            
            setToast({
              show: true,
              message: `¡ALIMENTO ${newFood.name} CREADO CON ÉXITO!`,
              type: 'amber'
            });

            setNewFood({ name: '', category: 'frutas', emoji: '🍎', healthy: true, soundText: '' });
            speak("¡Se guardó el nuevo alimento en la estantería!");
          };

          const handleDeleteFood = (id) => {
            setFoods(foods.filter(f => f.id !== id));
          };

          const handleSaveActivity = (e) => {
            e.preventDefault();
            const newSequence = { 
              ...customSequence, 
              id: Date.now(), 
              fecha_creacion: new Date().toLocaleDateString() 
            };
            
            const updatedActivities = [...customActivities, newSequence];
            setCustomActivities(updatedActivities);
            setSequenceToPrint(newSequence);

            setToast({
              show: true,
              message: "¡PLANIFICACIÓN GUARDADA EN EL HISTORIAL!",
              type: 'purple'
            });
            
            speak("Planificación didáctica guardada con éxito. Ya podés descargar el informe oficial en PDF.");
            
            setCustomSequence({ 
              ...customSequence,
              name: '', 
              description: '', 
              activities: ''
            });
          };

          // === MOTOR DE IMPRESIÓN ROBUSTO (EVITA BLOQUEO DE IFRAME / PERMITE GUARDAR PDF) ===
          const printSection = (sectionType, data = null) => {
            if (sectionType === 'sequence' && data) {

                        className="bg-yellow-400 hover:bg-yellow-500 text-yellow-950 font-black text-xl px-8 py-4 rounded-2xl border-b-6 border-yellow-600 transition-all uppercase flex items-center gap-2 shadow-lg btn-print-action"
                      >
                        <i className="fa-solid fa-print"></i> Imprimir Diploma / Guardar PDF
                      </button>

                      <button 
                        onClick={resetGame}
                        className="bg-slate-800 hover:bg-slate-900 text-white font-black text-xl px-8 py-4 rounded-2xl border-b-6 border-slate-950 transition-all uppercase flex items-center gap-2 shadow-lg btn-print-action"
                      >
                        ¡Jugar de Nuevo!
                      </button>
                    </div>

                  </div>
                )}

              </main>

              {/* === ELEMENTOS EXCLUSIVOS EN DOM PARA EXTRACCIÓN DE IMPRESIÓN (OCULTOS EN INTERFAZ ACTIVA) === */}
              <div style={{ display: 'none' }}>
                
                {/* 1. DIPLOMA EXCLUSIVO IMPRESIÓN */}
                <div id="printable-diploma" className="p-12 text-center bg-white border-[16px] border-[#00A75A] rounded-3xl max-w-4xl mx-auto my-0">
                  <div className="flex justify-center mb-4">
                    <BrandLogo className="h-14" maxW="110px" />
                  </div>
                  <h2 className="text-[#E5007D] font-black text-5xl uppercase tracking-widest mb-1 font-kids">DIPLOMA DE HONOR</h2>
                  <p className="text-slate-500 font-extrabold text-xs uppercase tracking-wider mb-6">EL DESAFÍO DEL PLATO SALUDABLE • NIVEL INICIAL</p>
                  <p className="text-slate-600 font-bold uppercase text-sm mb-4">SE LE OTORGA CON MUCHA ALEGRÍA A:</p>
                  <h1 className="text-5xl font-black text-slate-800 uppercase tracking-wide border-b-4 border-dashed border-[#00A75A] pb-2 mb-6 inline-block font-kids">{studentName}</h1>
                  <p className="text-slate-600 font-black uppercase text-base max-w-xl mx-auto leading-relaxed mb-6">
                    POR COMPLETAR DE MANERA EXCELENTE TODOS LOS DESAFÍOS Y DEMOSTRAR SER TODO UN/A <strong>SÚPER EXPERTO/A EN ALIMENTACIÓN SALUDABLE</strong>.
                  </p>
                  <div className="flex justify-around items-end pt-12 border-t-2 border-slate-200 mt-12">
                    <div className="text-center">
                      <span className="text-4xl">🍎</span>
                      <p className="text-xs font-black text-slate-500 uppercase mt-2">SÚPER SALUD</p>
                    </div>
                    <div className="text-center">
                      <div className="w-40 h-8 border-b-2 border-slate-300 mb-1"></div>
                      <p className="text-xs font-black text-slate-500 uppercase">FIRMA DE LA ESCUELA</p>
                    </div>
                  </div>
                </div>

                {/* 2. REPORTES EXCLUSIVOS IMPRESIÓN */}
                <div id="printable-report" className="p-8 bg-white max-w-4xl mx-auto border-2 border-slate-300 rounded-xl">
                  <div className="flex justify-between items-center border-b-4 border-[#00A75A] pb-4 mb-6">
                    <div>
                      <h1 className="text-2xl font-black text-slate-800 uppercase font-kids">INFORME DE DESEMPEÑO INDIVIDUAL - CHF</h1>
                      <p className="text-xs font-bold text-slate-500 uppercase">PROYECTO: EL DESAFÍO DEL PLATO SALUDABLE</p>
                    </div>
                    <BrandLogo className="h-8" maxW="85px" />
                  </div>

                  <div className="grid grid-cols-2 gap-4 border-b-2 border-slate-100 pb-4 mb-4">
                    <div>
                      <p className="text-xs font-black text-slate-400 uppercase">Estudiante / Sala:</p>
                      <p className="text-base font-black text-slate-800 uppercase">{studentName} - {currentRoom || "NIVEL INICIAL"}</p>
                    </div>
                    <div>
                      <p className="text-xs font-black text-slate-400 uppercase">Fecha:</p>
                      <p className="text-base font-black text-slate-800 uppercase">{new Date().toLocaleDateString()}</p>
                    </div>
                  </div>

                  <div className="space-y-6">
                    {LEVELS.map(lvl => {
                      const stat = gameStats[lvl.id] || { foods: [], attempts: 0, time: 0 };
                      return (
                        <div key={lvl.id} className="border-b border-slate-200 pb-4">
                          <div className="flex justify-between items-center mb-2">
                            <h4 className="font-extrabold text-sm uppercase text-slate-800">{lvl.name}</h4>
                            <span className="text-xs text-slate-500 font-bold uppercase">
                              Tiempo Empleado: {stat.time}s | Intentos: {stat.attempts}
                            </span>
                          </div>
                          <div className="flex flex-wrap gap-2 items-center">
                            <span className="text-xs font-bold uppercase text-slate-400">Alimentos seleccionados:</span>
                            {stat.foods.length === 0 ? (
                              <span className="text-xs text-red-500 font-extrabold uppercase">Sin Resolver</span>
                            ) : (
                              stat.foods.map(f => (
                                <span key={f.id} className="px-2 py-0.5 border border-slate-300 rounded text-xs uppercase">
                                  {f.emoji} {f.name} ({f.healthy ? 'Saludable' : 'Poco Saludable'})
                                </span>
                              ))
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="mt-8 pt-4 border-t-2 border-slate-200 bg-slate-50 p-4 rounded-xl">
                    <h4 className="text-xs font-black text-slate-800 uppercase mb-2">Observaciones Pedagógicas Sugeridas:</h4>
                    <p className="text-xs text-slate-600 uppercase leading-relaxed">
                      El alumno {studentName} muestra buena participación activa en las dinámicas digitales de la marca Capacitarte hacia el Futuro. Reconoce de forma óptima las combinaciones alimenticias recomendadas por Súper Salud.
                    </p>
                  </div>
                </div>

                {/* 3. PLANIFICACIONES EXCLUSIVAS PARA IMPRIMIR EN PDF */}
                {sequenceToPrint && (
                  <div id="printable-goed-sequence" className="p-10 bg-white max-w-4xl mx-auto border-4 border-[#E5007D] rounded-3xl my-0">
                    <div className="flex justify-between items-start border-b-4 border-[#E5007D] pb-4 mb-6">
                      <div>
                        <h1 className="text-2xl font-black text-slate-900 uppercase font-kids">CAPACITARTE HACIA EL FUTURO (CHF)</h1>
                        <p className="text-sm font-bold text-pink-700 uppercase">Secuencia Didáctica de Innovación en el Aula • Planificación Pedagógica</p>
                      </div>
                      <BrandLogo className="h-10" maxW="90px" />
                    </div>

                    <div className="bg-pink-50/50 p-4 rounded-2xl border-2 border-pink-200 mb-6 grid grid-cols-2 gap-4">
                      <div>
                        <p className="text-xs font-black text-pink-800 uppercase">Nombre del Proyecto:</p>
                        <p className="text-base font-black text-slate-800 uppercase">{sequenceToPrint.name}</p>
                      </div>
                      <div>
                        <p className="text-xs font-black text-pink-800 uppercase">Establecimiento Escolar:</p>
                        <p className="text-base font-black text-slate-800 uppercase">{sequenceToPrint.school}</p>
                      </div>
                      <div>
                        <p className="text-xs font-black text-pink-800 uppercase">Docente / Planificador:</p>
                        <p className="text-base font-black text-slate-800 uppercase">{sequenceToPrint.author}</p>
                      </div>
                      <div>
                        <p className="text-xs font-black text-pink-800 uppercase">Edad Destinataria:</p>
                        <p className="text-base font-black text-slate-800 uppercase">
                          {sequenceToPrint.targetAge === 'SALA ABIERTA' ? 'SALA ABIERTA / MULTIEDAD' : sequenceToPrint.targetAge}
                        </p>
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div>
                        <h3 className="text-xs font-black text-pink-800 uppercase border-b-2 border-pink-200 pb-1 mb-2">Fundamentación y Propósitos Pedagógicos</h3>
                        <p className="text-xs font-bold uppercase leading-relaxed text-slate-700 whitespace-pre-wrap">{sequenceToPrint.description}</p>
                      </div>

                      <div>
                        <h3 className="text-xs font-black text-pink-800 uppercase border-b-2 border-pink-200 pb-1 mb-2">Desarrollo de la Secuencia (Paso a Paso)</h3>
                        <p className="text-xs font-bold uppercase leading-relaxed text-slate-700 whitespace-pre-wrap">{sequenceToPrint.activities}</p>
                      </div>

                      <div>
                        <h3 className="text-xs font-black text-pink-800 uppercase border-b-2 border-pink-200 pb-1 mb-2">Integración Tecnopedagógica de CHF</h3>
                        <p className="text-xs font-bold uppercase leading-relaxed text-slate-500">
                          ESTA PROPUESTA INCORPORA EL SOFTWARE EDUCATIVO "EL DESAFÍO DEL PLATO SALUDABLE" CON ASISTENTE VIRTUAL POR VOZ, PROMOVIENDO LA ALFABETIZACIÓN DIGITAL Y LA ORALIDAD EN LA SALA.
                        </p>
                      </div>
                    </div>

                    <div className="flex justify-around items-center mt-20 pt-10 border-t-2 border-slate-200">
                      <div className="text-center">
                        <div className="w-40 h-8 border-b-2 border-slate-300 mb-1"></div>
                        <p className="text-[10px] font-black text-slate-400 uppercase">Firma del Planificador</p>
                      </div>
                      <div className="text-center">
                        <div className="w-40 h-8 border-b-2 border-slate-300 mb-1"></div>
                        <p className="text-[10px] font-black text-slate-400 uppercase">Coordinación CHF / Dirección</p>
                      </div>
                    </div>
                  </div>
                )}

              </div>

              {/* TOAST DE NOTIFICACIÓN FLOTANTE */}
              {toast.show && (
                <div className="fixed bottom-5 right-5 z-50 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 border-4 max-w-sm animate-bounce bg-slate-900 border-pink-500">
                  <div className="p-2 rounded-full text-white bg-[#E5007D]">
                    <i className="fa-solid fa-bell text-lg"></i>
                  </div>
                  <div>
                    <p className="text-[10px] font-black uppercase text-pink-300">AVISO DE SISTEMA</p>
                    <p className="text-xs font-black uppercase leading-tight">{toast.message}</p>
                  </div>
                  <button 
                    onClick={() => setToast({ ...toast, show: false })} 
                    className="text-slate-400 hover:text-white font-bold text-sm ml-2"
                  >
                    ✕
                  </button>
                </div>
              )}

              {/* PIE DE PÁGINA (Oculto al imprimir) */}
              <footer className="bg-slate-900 text-slate-400 text-center py-4 text-xs font-bold uppercase tracking-wider border-t-4 border-[#00A75A] no-print">
                <div>
                  Todos los derechos reservados por el creador © 2026. Desplegado para Capacitarte hacia el Futuro.
                </div>
              </footer>

              {/* === MODAL PIN DE DOCENTES (Oculto al imprimir) === */}
              {showPinModal.active && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                  <div className="bg-white rounded-3xl border-6 border-pink-400 p-6 max-w-sm w-full text-center shadow-2xl">
                    <div className="bg-pink-100 p-3 rounded-full inline-block mb-3">
                      <i className="fa-solid fa-lock text-3xl text-[#E5007D]"></i>
                    </div>
                    <h3 className="text-xl font-black text-slate-800 uppercase mb-2">CONTROL DE ADULTOS</h3>
                    <p className="text-xs font-bold text-slate-500 uppercase mb-4 leading-normal">
                      Escribe el PIN de docentes para ingresar: <strong className="text-[#E5007D] font-black">1234</strong>
                    </p>

                    <input 
                      type="password" 
                      maxLength="4"
                      value={pinInput}
                      onChange={(e) => setPinInput(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter') handlePinValidation(); }}
                      className="w-full text-center text-3xl font-bold tracking-widest p-2 border-3 border-slate-300 rounded-xl focus:outline-none focus:border-[#E5007D] bg-slate-50 mb-3"
                      placeholder="••••"
                    />

                    {docenteError && <p className="text-[10px] text-red-500 font-extrabold uppercase mb-3">{docenteError}</p>}

                    <div className="flex gap-2">
                      <button 
                        onClick={() => {
                          setShowPinModal({ active: false, targetScreen: '' });
                          setPinInput('');
                          setDocenteError('');
                        }}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-extrabold py-2.5 rounded-xl text-xs uppercase"
                      >
                        Cancelar
                      </button>
                      <button 
                        onClick={handlePinValidation}
                        className="flex-1 bg-[#E5007D] hover:bg-[#c2006a] text-white font-extrabold py-2.5 rounded-xl text-xs uppercase"
                      >
                        Confirmar
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
